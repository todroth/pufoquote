services:
  elasticsearch:
    image: elasticsearch:9.3.4
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: ghcr.io/todroth/pufoquote:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ELASTICSEARCH_URI=http://elasticsearch:9200
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - PODCAST_FEED_URL=${PODCAST_FEED_URL:-https://feeds.acast.com/public/shows/0301869f-de1f-4fac-97f9-ed5bf6faab23}
      - TRANSCRIPTION_CACHE_DIR=/data/transcriptions
      - THYMELEAF_CACHE=${THYMELEAF_CACHE:-false}
    volumes:
      - ./transcriptions:/data/transcriptions
    depends_on:
      elasticsearch:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  es_data:
  caddy_data:
  caddy_config:
