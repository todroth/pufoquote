<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAS PODCAST UFO – Zitate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      background-color: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
    }
    .brand {
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
    }
    .category-btn {
      border-radius: 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 0.35rem 1rem;
      text-transform: uppercase;
      font-weight: 600;
      border: 1.5px solid #444;
      color: #aaa;
      background: transparent;
      text-decoration: none;
      transition: all 0.15s;
    }
    .category-btn:hover {
      border-color: #f0f0f0;
      color: #f0f0f0;
    }
    .category-btn.active {
      background: #f0f0f0;
      color: #0d0d0d;
      border-color: #f0f0f0;
    }
    .quote-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 1rem;
      padding: 2.5rem 3rem;
      max-width: 720px;
      margin: 0 auto;
    }
    .quote-text {
      font-size: 1.4rem;
      line-height: 1.6;
      font-style: italic;
      color: #f0f0f0;
    }
    .quote-meta {
      font-size: 0.85rem;
      color: #888;
      margin-top: 1.5rem;
    }
    .quote-meta a {
      color: #888;
      text-decoration: none;
    }
    .quote-meta a:hover {
      color: #f0f0f0;
    }
    .next-btn {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2rem;
      padding: 0.6rem 2rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85rem;
      background: #f0f0f0;
      color: #0d0d0d;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 100;
    }
    .next-btn:hover {
      opacity: 0.85;
      color: #0d0d0d;
    }
    .empty-state {
      color: #666;
      font-size: 1rem;
      text-align: center;
      padding: 3rem 0;
    }
  </style>
</head>
<body>
<div class="container py-5" style="padding-bottom: 6rem !important;">

  <!-- Header -->
  <div class="text-center mb-5">
    <div class="brand mb-1">DAS PODCAST UFO</div>
    <div style="color:#666; font-size:0.8rem; letter-spacing:0.1em;">ZUFALLSZITAT</div>
  </div>

  <!-- Category filter -->
  <div class="d-flex flex-wrap justify-content-center gap-2 mb-5">
    <th:block th:each="cat : ${categories}">
      <a
        th:href="@{'/' + '?category=' + ${cat.name()}}"
        th:text="${cat.displayName}"
        th:classappend="${cat == currentCategory} ? ' active' : ''"
        class="category-btn">
      </a>
    </th:block>
  </div>

  <!-- Quote card -->
  <div th:if="${quote != null}" class="quote-card mb-5">
    <div class="quote-text">„<span th:text="${quote.text()}"></span>"</div>
    <div class="quote-meta">
      <th:block th:if="${quote.episodeUrl() != null and !quote.episodeUrl().isEmpty()}">
        <a th:href="${quote.episodeUrl()}" target="_blank" th:text="${quote.episodeName()}"></a>
      </th:block>
      <th:block th:unless="${quote.episodeUrl() != null and !quote.episodeUrl().isEmpty()}">
        <span th:text="${quote.episodeName()}"></span>
      </th:block>
      <span th:if="${quote.timestamp() != null}">
        &nbsp;·&nbsp;<span th:text="${quote.timestamp()}"></span>
      </span>
    </div>
  </div>

  <div th:if="${quote == null}" class="empty-state">
    Noch keine Zitate in dieser Kategorie vorhanden.
  </div>

  <!-- Next quote button — fixed at bottom so position never changes between quotes -->
  <a
    th:href="@{'/' + '?category=' + ${currentCategory.name()}}"
    class="next-btn">
    Nächstes Zitat
  </a>

</div>
</body>
</html>
