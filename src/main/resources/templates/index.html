<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🛸 DAS PODCAST UFO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <header class="header">
    <span class="header-emoji">🛸</span>
    <span class="header-title">Das Podcast UFO</span>
  </header>

  <nav class="categories">
    <th:block th:each="cat : ${categories}">
      <a
        th:href="@{/(category=${cat.name()})}"
        th:text="${cat.displayName}"
        th:classappend="${cat == currentCategory} ? ' active' : ''"
        class="cat-btn">
      </a>
    </th:block>
  </nav>

  <main class="quote-area">
    <div th:if="${quote != null}">
      <p class="quote-text" th:text="${quote.text()}"></p>
      <div class="quote-divider"></div>
      <div class="quote-meta">
        <th:block th:if="${quote.episodeUrl() != null and !quote.episodeUrl().isEmpty()}">
          <a th:href="${quote.episodeUrl()}" target="_blank" th:text="${quote.episodeName()}"></a>
        </th:block>
        <th:block th:unless="${quote.episodeUrl() != null and !quote.episodeUrl().isEmpty()}">
          <span th:text="${quote.episodeName()}"></span>
        </th:block>
        <span th:if="${quote.timestamp() != null}" class="meta-dot">·</span>
        <span th:if="${quote.timestamp() != null}" th:text="${quote.timestamp()}"></span>
      </div>
    </div>

    <p th:if="${quote == null}" class="empty">Keine Zitate in dieser Kategorie.</p>
  </main>

  <a th:href="@{/(category=${currentCategory.name()})}" class="next-btn">
    Nächstes Zitat
  </a>

</body>
</html>
