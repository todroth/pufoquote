<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAS PODCAST UFO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <header class="header">
    <a id="home-link" href="/" class="header-link">
      <span class="header-emoji">🛸</span>
      <span class="header-title">Das Podcast UFO</span>
    </a>
  </header>

  <nav class="categories">
    <th:block th:each="cat : ${categories}">
      <a
        th:href="@{/(category=${cat.name()})}"
        th:text="${cat.displayName}"
        th:classappend="${cat == currentCategory} ? ' active' : ''"
        th:data-category="${cat.name()}"
        class="cat-btn">
      </a>
    </th:block>
  </nav>

  <main class="quote-area">
    <div id="quote-card" th:if="${quote != null}">
      <p id="quote-text" class="quote-text" th:text="${quote.text()}"></p>
      <div class="quote-divider"></div>
      <div class="quote-meta">
        <a id="quote-episode" th:href="${quote.episodeUrl()}" target="_blank" th:text="${quote.episodeName()}"></a>
        <span class="meta-dot">·</span>
        <span id="quote-timestamp" th:text="${quote.timestamp()}"></span>
      </div>
    </div>

    <p id="quote-empty" th:if="${quote == null}" class="empty">Keine Zitate in dieser Kategorie.</p>
  </main>

  <a id="next-btn" th:href="@{/(category=${currentCategory.name()})}" class="next-btn"
     th:data-category="${currentCategory.name()}">
    Nächstes Zitat
  </a>

  <script src="/js/main.js"></script>

</body>
</html>
