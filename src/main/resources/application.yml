spring:
  application:
    name: pufoquote
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD}
  thymeleaf:
    cache: false

groq:
  api-key: ${GROQ_API_KEY}
  categorization-model: llama-3.1-8b-instant

podcast:
  feed-url: ${PODCAST_FEED_URL:https://feeds.acast.com/public/shows/0301869f-de1f-4fac-97f9-ed5bf6faab23}

transcription:
  cache-dir: ${TRANSCRIPTION_CACHE_DIR:./transcriptions}

logging:
  level:
    net.droth.pufoquote: INFO
  file:
    name: /tmp/pufoquote.log
